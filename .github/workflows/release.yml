name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          mkdir -p dist

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            GOOS=${platform%/*}
            GOARCH=${platform#*/}

            output="dist/gowaybackgo_${GOOS}_${GOARCH}"
            [ "$GOOS" = "windows" ] && output="${output}.exe"

            echo "Building $output..."
            GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "$output" \
              .
          done

          ls -lh dist/

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gowaybackgo_linux_amd64
            dist/gowaybackgo_linux_arm64
            dist/gowaybackgo_darwin_amd64
            dist/gowaybackgo_darwin_arm64
            dist/gowaybackgo_windows_amd64.exe
            dist/checksums.txt
          generate_release_notes: false
